name: Build and Deploy Docker

on:
  push:
    tags:
      - '*.*.*'

jobs:
  build-image-and-push-job:
    runs-on : ubuntu-latest
    steps:
      - name: Clone Repo
        uses: actions/checkout@v5
      
      - name: build-docker-image and push to github
        uses: mr-smithers-excellent/docker-build-push@v6
        with:
          image: ${{github.event.repository.name}}
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}

  auto-deploy-docker-job:
    runs-on: ubuntu-latest
    needs: build-image-and-push-job
    environment: production_test
    env:
      CONTAINER_NAME: ${{github.actor}}
      SERVER_PORT: 6969 #http://45.32.108.242:6969
      DOCKER_IMAGE_URL: 'ghcr.io/${{ github.actor }}/${{ github.event.repository.name }}:${{ github.ref.name }}'
    steps:
      - name: Executing remote ssh to PRODUCTION server
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: '22'
          script: |
            docker -v
            docker logout ghcr.io
            docker login -u ${{github.actor}} -p ${{ secrets.GITHUB_TOKEN }} ghcr.io/ ${{github.actor}} /${{ github.event.repository.name }}
            docker rm -f ${{ env.CONTAINER_NAME }} | true
            docker pull ${{ env.DOCKER_IMAGE_URL}}
            
            docker run --restart=always -d --name ${{ env.CONTAINER_NAME }} -p ${{ env.SERVER_PORT }}:80 ${{ env.DOCKER_IMAGE_URL}}





