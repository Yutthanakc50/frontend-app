name: Frontend APP DEMO

on:
  push:
    branches:
      - 'feature/**'
      - 'bugfix/**'
      - 'chore/**'
      - main #อย่าลืมลบถ้าใช้ flow ปกติ
  pull_request:
    branches:
      - main


jobs:
  lint-job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'npm'
      #- run: node -v
      - run: npm ci #clean i เเทน npm i
      - run: npm run lint

  build-job:
    runs-on: ubuntu-latest
    needs: lint-job
    steps:
      - name: Clone Repo
        uses: actions/checkout@v5
      - name: Setup node js v24.x
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'npm'
      #- run: node -v
      - name: Install dependencies
        run: npm ci #clean i เเทน npm i
      - name: Build Project
        run: npm run build